# ─── Server ─────────────────────────────────────────────────────
server.port=${PORT:9090}
 
# ─── Aiven MySQL Database ────────────────────────────────────────
# These ${VARIABLE} values are set as environment variables on Render
# When running locally, replace the values after the colon as defaults
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true&verifyServerCertificate=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# ─── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
 
# ─── Jackson JSON ────────────────────────────────────────────────
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.property-naming-strategy=SNAKE_CASE
 
# ─── File Upload ─────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spms.upload.path=./uploads
 
# ─── Session & Logging ───────────────────────────────────────────
server.servlet.session.timeout=60m
logging.level.project.spms=INFO
