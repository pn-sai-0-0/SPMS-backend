# ─── Test Profile: H2 In-Memory Database ─────────────────────────────────────
# This file is automatically picked up when @ActiveProfiles("test") is used.
# It replaces the MySQL connection with an in-memory H2 database so that
# ALL tests run without any network connection to Aiven Cloud.

spring.datasource.url=jdbc:h2:mem:spmstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-create the schema from entity classes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable MySQL-specific SSL flags
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# Server port for integration / system tests
server.port=0

# Upload path (temp folder for file tests)
spms.upload.path=./test-uploads

# Reduce logging noise during tests
logging.level.project.spms=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
